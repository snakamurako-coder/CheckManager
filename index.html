<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('css'); ?>
  </head>
  <body>
    <div id="app">
      <div id="setup-view" class="view">
        <h2>課題点検・小テスト入力</h2>
        
        <? if (isAdmin) { ?>
          <div id="admin-panel" style="background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c2e0ff;">
            <p style="margin:0 0 10px 0; font-size: 12px; color: #1967d2; font-weight: bold;">管理者モードでログイン中: <?= userEmail ?></p>
            <button class="btn-primary" onclick="openAdminSettings()" style="width:100%; font-size: 16px;">⚙️ 管理・システム設定を開く</button>
          </div>
        <? } ?>

        <div class="input-group">
          <label>クラス選択</label>
          <select id="class-select" onchange="loadClassData()"></select>
        </div>
        <div class="input-group">
          <label>課題/テスト選択</label>
          <select id="task-select"></select>
        </div>
        <div class="mode-buttons">
          <button class="tile-btn" onclick="startMode(1)">① 出席番号順に入力</button>
          <button class="tile-btn" onclick="startMode(2)">② 番号参照で入力</button>
        </div>
      </div>

      <div id="admin-view" class="view" style="display:none;">
        <h3 style="color: #1a73e8;">⚙️ システム設定</h3>
        <p style="font-size: 14px; color: #555;">Configブックを開かずにアプリの設定を変更できます。</p>
        
        <div class="input-group">
          <label style="font-weight:bold;">点検対象スプレッドシートID</label>
          <input type="text" id="target-ss-id" style="width:90%; padding:10px; margin-top:5px; border: 1px solid #ccc; border-radius: 4px;">
          <small style="display:block; margin-top:5px; color:#666;">※URLの /d/ と /edit の間の文字列</small>
        </div>
        <div class="input-group">
          <label style="font-weight:bold;">小テスト合格点（基準値）</label>
          <input type="number" id="pass-score" style="width:90%; padding:10px; margin-top:5px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        
        <div style="margin-top: 30px;">
          <button class="btn-primary" onclick="saveSettings()">設定を保存して再読込</button>
          <button class="btn-gray" onclick="showSetup()" style="width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; margin-top: 10px; color: white; border: none;">キャンセル</button>
        </div>
      </div>

      <div id="sequential-view" class="view" style="display:none;">
        <div class="status-bar">
          <span id="seq-current-info" style="font-weight: bold; font-size: 18px;"></span>
        </div>
        <div class="name-display" id="seq-name">氏名</div>
        <div class="action-buttons">
          <button class="btn btn-green" onclick="record('提')">提出</button>
          <button class="btn btn-red" onclick="record('未')">未提出</button>
          <button class="btn btn-yellow" onclick="record('再')">再提出</button>
          <button class="btn btn-purple" onclick="record('休')">休み</button>
        </div>
        <div class="footer-nav">
          <button onclick="prevStudent()" style="padding: 10px; border-radius: 5px;">前へ</button>
          <button id="submit-btn-seq" style="display:none; flex-grow: 1;" class="btn-primary" onclick="confirmData()">入力を確定する</button>
          <button onclick="showSetup()" style="padding: 10px; border-radius: 5px;">中断して戻る</button>
        </div>
      </div>

      <div id="reference-view" class="view" style="display:none;">
        <button class="btn-primary" onclick="confirmData()">入力を確定する</button>
        <div class="search-box">
          <div id="ref-name-display" class="name-display" style="height: 80px; font-size: 20px;">番号を入力してください</div>
          <input type="number" id="ref-input" readonly>
        </div>
        <div class="keypad">
          <button onclick="kp(7)">7</button><button onclick="kp(8)">8</button><button onclick="kp(9)">9</button>
          <button onclick="kp(4)">4</button><button onclick="kp(5)">5</button><button onclick="kp(6)">6</button>
          <button onclick="kp(1)">1</button><button onclick="kp(2)">2</button><button onclick="kp(3)">3</button>
          <button class="btn-gray" onclick="kp('Del')" style="color:white; font-weight:bold;">Del</button>
          <button onclick="kp(0)">0</button>
          <button class="btn-green" onclick="kp('提')" style="color:white; font-weight:bold;">提</button>
          <button class="btn-red" onclick="kp('未')" style="color:white; font-weight:bold;">未</button>
          <button class="btn-yellow" onclick="kp('再')" style="color:white; font-weight:bold;">再</button>
          <button class="btn-purple" onclick="kp('休')" style="color:white; font-weight:bold;">休</button>
        </div>
        <button onclick="showSetup()" style="width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; margin-top: 20px;">中断して戻る</button>
      </div>
    </div>
    <?!= include('js'); ?>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('css'); ?>
  </head>
  <body>
    <div id="app">
      <? if (isGuest) { ?>
        <div class="view" style="justify-content: center; align-items: center; text-align: center;">
          <h2 style="color: #ea4335;">アクセスエラー</h2>
          <p>このアプリを使用する権限がありません。<br>管理者に連絡して「ユーザー管理」シートに追加してもらってください。</p>
          <p style="color: #666; font-size: 14px; margin-top: 20px;">あなたのGoogleアカウント: <?= userEmail ?></p>
        </div>
      <? } else { ?>

      <div id="setup-view" class="view">
        <h2>点検・入力システム</h2>
        
        <? if (isAdmin) { ?>
          <div id="admin-panel" style="background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c2e0ff;">
            <p style="margin:0 0 10px 0; font-size: 12px; color: #1967d2; font-weight: bold;">管理者: <?= userEmail ?></p>
            <button class="btn-primary" onclick="openAdminSettings()" style="width:100%; font-size: 16px; padding: 10px;">⚙️ 管理・システム設定</button>
          </div>
        <? } ?>

        <div class="toggle-container">
          <button id="book-toggle-assign" class="toggle-btn active" onclick="setBookType('assignment')">提出物</button>
          <button id="book-toggle-quiz" class="toggle-btn" onclick="setBookType('quiz')">小テスト</button>
        </div>

        <div class="input-group">
          <label>クラス選択</label>
          <select id="class-select" onchange="loadClassData()"></select>
        </div>
        <div class="input-group">
          <label>対象の列（課題/テスト）</label>
          <select id="task-select"></select>
        </div>

        <div class="mode-buttons">
          <button class="tile-btn" onclick="startMode(1)">
            <span style="font-size: 24px;">①</span><br>出席番号順
          </button>
          <button class="tile-btn" onclick="startMode(2)">
            <span style="font-size: 24px;">②</span><br>番号参照
          </button>
        </div>
      </div>

      <!-- 管理者設定ビュー -->
      <div id="admin-view" class="view" style="display:none;">
        <h3 style="color: #1a73e8;">⚙️ システム設定</h3>
        <div style="overflow-y: auto; flex-grow: 1; padding-bottom: 20px;">
          <div class="input-group">
            <label style="font-weight:bold;">提出物ブックID</label>
            <input type="text" id="admin-assign-id" class="admin-input">
          </div>
          <div class="input-group">
            <label style="font-weight:bold;">小テストブックID</label>
            <input type="text" id="admin-quiz-id" class="admin-input">
          </div>
          <div class="input-group">
            <label style="font-weight:bold;">ID使用フラグ (true/false)</label>
            <input type="text" id="admin-id-flag" class="admin-input">
          </div>
          <p style="font-size: 12px; color: #666; margin-top: 10px;">※設定を保存すると、対象ブックの全シートA1セルに「提出物」または「小テスト」が自動登録されます。</p>
        </div>
        <div>
          <button class="btn-primary" onclick="saveSettings()">設定を保存して再読込</button>
          <button class="btn-gray" onclick="showSetup()" style="width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; margin-top: 10px; color: white; border: none;">キャンセル</button>
        </div>
      </div>

      <!-- モード1：出席番号順ビュー -->
      <div id="sequential-view" class="view" style="display:none;">
        <div class="status-bar">
          <span id="seq-current-info" style="font-weight: bold; font-size: 18px;"></span>
        </div>
        <div class="name-display" id="seq-name" style="height: 80px;">氏名</div>
        
        <!-- 提出物用のアクション -->
        <div id="seq-assign-actions" class="action-buttons" style="display:none;">
          <button class="btn btn-green" onclick="recordSeqAssign('提')">提出</button>
          <button class="btn btn-red" onclick="recordSeqAssign('未')">未提出</button>
          <button class="btn btn-yellow" onclick="recordSeqAssign('再')">再提出</button>
          <button class="btn btn-purple" onclick="recordSeqAssign('休')">休み</button>
        </div>

        <!-- 小テスト用のアクション -->
        <div id="seq-quiz-actions" style="display:none; flex-grow: 1;">
          <div style="text-align:center; font-size: 24px; font-weight:bold; margin-bottom:10px; color:#1a73e8;" id="seq-quiz-score">_</div>
          <div class="keypad">
            <button onclick="kpSeq(7)">7</button><button onclick="kpSeq(8)">8</button><button onclick="kpSeq(9)">9</button>
            <button onclick="kpSeq(4)">4</button><button onclick="kpSeq(5)">5</button><button onclick="kpSeq(6)">6</button>
            <button onclick="kpSeq(1)">1</button><button onclick="kpSeq(2)">2</button><button onclick="kpSeq(3)">3</button>
            <button class="btn-gray" onclick="kpSeq('Del')" style="color:white; font-weight:bold;">Del</button>
            <button onclick="kpSeq(0)">0</button>
            <button class="btn-green" onclick="kpSeq('Enter')" style="color:white; font-weight:bold;">次へ</button>
          </div>
        </div>

        <div class="footer-nav" style="margin-top: 20px;">
          <button class="nav-btn" onclick="prevStudent()">前へ戻る</button>
          <button id="submit-btn-seq" style="display:none; flex-grow: 1;" class="btn-primary" onclick="confirmData()">全入力を確定</button>
          <button class="nav-btn" onclick="saveAndExit()">中断</button>
        </div>
      </div>

      <!-- モード2：番号参照ビュー -->
      <div id="reference-view" class="view" style="display:none;">
        <button class="btn-primary" onclick="confirmData()" style="margin-bottom: 10px;">全入力を確定する</button>
        
        <div class="search-box" style="margin-bottom: 15px;">
          <div id="ref-status-display" style="text-align:center; font-weight:bold; color:#1a73e8; margin-bottom:5px;"></div>
          <div id="ref-name-display" class="name-display" style="height: 60px; font-size: 20px; margin: 0 0 10px 0;">番号を入力</div>
          <input type="number" id="ref-input" readonly style="width:100%; box-sizing:border-box;">
        </div>

        <!-- 提出物用キーパッド -->
        <div id="ref-assign-keypad" class="keypad" style="display:none;">
          <button onclick="kpRef(7)">7</button><button onclick="kpRef(8)">8</button><button onclick="kpRef(9)">9</button>
          <button onclick="kpRef(4)">4</button><button onclick="kpRef(5)">5</button><button onclick="kpRef(6)">6</button>
          <button onclick="kpRef(1)">1</button><button onclick="kpRef(2)">2</button><button onclick="kpRef(3)">3</button>
          <button class="btn-gray" onclick="kpRef('Del')" style="color:white; font-weight:bold;">Del</button>
          <button onclick="kpRef(0)">0</button>
          <button class="btn-gray" onclick="kpRef('Clear')" style="color:white; font-weight:bold;">C</button>
          
          <button class="btn-green" onclick="recordRefAssign('提')" style="color:white; font-weight:bold; grid-column: span 3; padding: 10px;">提</button>
          <button class="btn-red" onclick="recordRefAssign('未')" style="color:white; font-weight:bold;">未</button>
          <button class="btn-yellow" onclick="recordRefAssign('再')" style="color:white; font-weight:bold;">再</button>
          <button class="btn-purple" onclick="recordRefAssign('休')" style="color:white; font-weight:bold;">休</button>
        </div>

        <!-- 小テスト用キーパッド (番号入力 -> 得点入力の遷移) -->
        <div id="ref-quiz-keypad" class="keypad" style="display:none;">
          <button onclick="kpRefQuiz(7)">7</button><button onclick="kpRefQuiz(8)">8</button><button onclick="kpRefQuiz(9)">9</button>
          <button onclick="kpRefQuiz(4)">4</button><button onclick="kpRefQuiz(5)">5</button><button onclick="kpRefQuiz(6)">6</button>
          <button onclick="kpRefQuiz(1)">1</button><button onclick="kpRefQuiz(2)">2</button><button onclick="kpRefQuiz(3)">3</button>
          <button class="btn-gray" onclick="kpRefQuiz('Del')" style="color:white; font-weight:bold;">Del</button>
          <button onclick="kpRefQuiz(0)">0</button>
          <button class="btn-green" onclick="kpRefQuiz('Enter')" style="color:white; font-weight:bold;">入力</button>
        </div>

        <button class="nav-btn" onclick="saveAndExit()" style="width: 100%; margin-top: 20px;">中断して戻る</button>
      </div>

      <!-- 新規登録モーダル -->
      <div id="new-task-modal" class="modal" style="display:none;">
        <div class="modal-content">
          <h3 style="margin-top: 0;" id="new-task-title">新規作成</h3>
          <div class="input-group">
            <label>日付 (例: 4/25)</label>
            <input type="text" id="new-task-date" placeholder="月/日">
          </div>
          <div class="input-group">
            <label>名称</label>
            <input type="text" id="new-task-name" placeholder="課題名・テスト名">
          </div>
          <button class="btn-primary" onclick="saveNewTask()" id="new-task-save-btn">保存して追加</button>
          <button class="nav-btn" onclick="closeNewTaskModal()" style="width: 100%; margin-top: 10px;">キャンセル</button>
        </div>
      </div>

      <? } ?>
    </div>
    <?!= include('js'); ?>
  </body>
</html>

<script>
let state = {
  bookType: 'assignment', // 'assignment' or 'quiz'
  currentClass: '',
  taskIndex: 0,
  taskName: '',
  taskDate: '',
  mode: 0, // 1 or 2
  students: [],
  results: [],
  currentIndex: 0,
  lastAction: null,
  refRequireTwoDigits: true,
  processCounter: 0,
  processOrderByRow: {},
  focusUnansweredOnly: false,
  dirtySheetRows: {}
};

// Mode 2 local vars
let tempNumStr = "";
let tempScoreStr = "";
let refQuizState = "number"; // "number" or "score"
let refTargetIdx = -1;
let availableBookTypes = {
  assignment: true,
  quiz_pf: true,
  quiz_score: true
};
let isAdminUser = false;

function getCurrentWorkingIndices() {
  if (!state.focusUnansweredOnly) return state.students.map((_, i) => i);
  const unanswered = [];
  for (let i = 0; i < state.results.length; i++) {
    if (state.results[i] === "" || state.results[i] === null) unanswered.push(i);
  }
  return unanswered;
}

function findFirstPendingFromWorkingSet() {
  const working = getCurrentWorkingIndices();
  return working.length > 0 ? working[0] : 0;
}

function getCurrentStudentIndex() {
  const working = getCurrentWorkingIndices();
  if (!working.length) return 0;
  if (state.currentIndex < 0) state.currentIndex = 0;
  if (state.currentIndex >= working.length) state.currentIndex = working.length - 1;
  return working[state.currentIndex];
}

function markProcessOrderByStudentIndex(studentIdx) {
  if (studentIdx < 0 || !state.students[studentIdx]) return;
  state.processCounter = (state.processCounter || 0) + 1;
  const row = state.students[studentIdx].sheetRow;
  state.processOrderByRow[row] = state.processCounter;
}

function markDirtyByStudentIndex(studentIdx) {
  if (studentIdx < 0 || !state.students[studentIdx]) return;
  if (!state.dirtySheetRows) state.dirtySheetRows = {};
  state.dirtySheetRows[String(state.students[studentIdx].sheetRow)] = true;
}

function resetRefInputState() {
  tempNumStr = "";
  tempScoreStr = "";
  refQuizState = "number";
  refTargetIdx = -1;
  clearAllRefInputs();
  syncQuizNumDisplay();
  syncQuizScoreDisplay();
  clearRefScoreLive();
  const nameEl = document.getElementById('ref-name-display');
  const badge = document.getElementById('ref-status-badge');
  const statusEl = document.getElementById('ref-status-display');
  if (nameEl) {
    nameEl.innerText = "—";
    nameEl.style.color = "";
  }
  if (badge) badge.innerText = "";
  if (statusEl) {
    statusEl.innerText = "【出席番号 入力】";
    statusEl.style.color = '#1a73e8';
  }
}

function buildResultsPayloadForSubmit(usePartialDirty) {
  if (!usePartialDirty) {
    return state.students.map((student, idx) => ({
      name: student.name,
      sheetRow: student.sheetRow,
      val: state.results[idx]
    }));
  }
  const out = [];
  state.students.forEach((student, idx) => {
    const rowKey = String(student.sheetRow);
    if (!state.dirtySheetRows || !state.dirtySheetRows[rowKey]) return;
    const val = state.results[idx];
    if (val === "" || val === null) return;
    out.push({ name: student.name, sheetRow: student.sheetRow, val });
  });
  return out;
}

function buildProcessOrderPayload(partialProcess) {
  if (!state.processOrderByRow) return {};
  if (!partialProcess) return Object.assign({}, state.processOrderByRow);
  const out = {};
  Object.keys(state.processOrderByRow).forEach(rowStr => {
    if (state.dirtySheetRows && state.dirtySheetRows[rowStr]) {
      out[rowStr] = state.processOrderByRow[rowStr];
    }
  });
  return out;
}

function getMissingStudents() {
  const missing = [];
  for (let i = 0; i < state.students.length; i++) {
    if (state.results[i] === "" || state.results[i] === null) {
      missing.push(state.students[i]);
    }
  }
  return missing;
}

function buildMissingStudentsMessage(missingStudents) {
  if (!missingStudents.length) return "未入力の生徒はいません。";
  const names = missingStudents.map(s => `${s.no}番 ${s.name}`).join("\n");
  return `以下の生徒の入力がありません。\n\n${names}\n\n全員を一括で「休み」（スプレッドシート上は「休」）にしますか？`;
}

function withSaveLoading(task) {
  const allButtons = document.querySelectorAll('button');
  allButtons.forEach(b => b.disabled = true);
  const loading = document.getElementById('saving-overlay');
  if (loading) loading.style.display = 'flex';
  task(() => {
    allButtons.forEach(b => b.disabled = false);
    if (loading) loading.style.display = 'none';
  });
}

function refreshBookToggles() {
  const mapping = [
    { key: 'assignment', id: 'book-toggle-assign' },
    { key: 'quiz_pf', id: 'book-toggle-quiz_pf' },
    { key: 'quiz_score', id: 'book-toggle-quiz_score' }
  ];
  mapping.forEach(item => {
    const btn = document.getElementById(item.id);
    if (!btn) return;
    const show = !!availableBookTypes[item.key];
    btn.style.display = show ? '' : 'none';
  });
}

function pickFirstAvailableBookType() {
  if (availableBookTypes.assignment) return 'assignment';
  if (availableBookTypes.quiz_pf) return 'quiz_pf';
  if (availableBookTypes.quiz_score) return 'quiz_score';
  return null;
}

function loadBookTypeAvailabilityAndStart() {
  google.script.run.withSuccessHandler(settings => {
    availableBookTypes = {
      assignment: !!(settings && settings.ASSIGNMENT_SS_ID),
      quiz_pf: !!(settings && settings.QUIZ_PF_SS_ID),
      quiz_score: !!(settings && settings.QUIZ_SCORE_SS_ID)
    };
    refreshBookToggles();
    const defaultType = pickFirstAvailableBookType();
    if (!defaultType) {
      alert("利用可能な点検票IDが設定されていません。管理者に連絡してください。");
      return;
    }
    setBookType(defaultType);
  }).withFailureHandler(() => {
    setBookType('assignment');
  }).getAdminSettings();
}

function clearAllRefInputs() {
  const ri = document.getElementById('ref-input');
  const qn = document.getElementById('ref-q-num');
  const qs = document.getElementById('ref-q-score');
  if (ri) ri.value = '';
  if (qn) qn.value = '';
  if (qs) qs.value = '';
}

function syncQuizNumDisplay() {
  const el = document.getElementById('ref-q-num');
  if (el) el.value = tempNumStr;
}

function syncQuizScoreDisplay() {
  const el = document.getElementById('ref-q-score');
  if (el) el.value = tempScoreStr;
}

function setRefRowLayout() {
  const std = document.getElementById('ref-cluster-std-left');
  const qn = document.getElementById('ref-cluster-qnum');
  const qs = document.getElementById('ref-cluster-qscore');
  const live = document.getElementById('ref-score-live');
  const nameEl = document.getElementById('ref-name-display');
  if (!std || !qn || !qs || !nameEl) return;
  if (state.bookType === 'quiz_score') {
    std.style.display = 'none';
    qn.style.display = 'flex';
    qs.style.display = 'flex';
    if (live) { live.style.display = 'none'; live.textContent = ''; }
    nameEl.classList.remove('ref-name-wide');
    nameEl.classList.add('ref-name-center');
  } else {
    std.style.display = 'block';
    qn.style.display = 'none';
    qs.style.display = 'none';
    if (live) { live.style.display = 'none'; live.textContent = ''; }
    nameEl.classList.add('ref-name-wide');
    nameEl.classList.remove('ref-name-center');
  }
}

/** スプレッドシートの番号列が数値/文字どちらでも照合できるようにする */
function normalizeRefNo(v) {
  if (v === null || v === undefined) return '';
  return String(v).trim();
}
function studentNoMatchesKey(s, key) {
  const n = normalizeRefNo(s.no);
  if (n === key) return true;
  const na = Number(n);
  const nb = Number(key);
  return !isNaN(na) && !isNaN(nb) && na === nb;
}
/** 照合に使う候補キー（2桁モード時は1桁入力に0埋め候補を追加） */
function buildRefLookupKeys(raw) {
  const s = String(raw).trim();
  if (!s) return [];
  const keys = [s];
  if (state.refRequireTwoDigits && /^\d$/.test(s)) keys.push('0' + s);
  return [...new Set(keys)];
}
function findStudentIndexByRefDigits(str) {
  if (!str || !state.students || !state.students.length) return -1;
  const candidates = buildRefLookupKeys(str);
  for (const key of candidates) {
    const idx = state.students.findIndex(s => studentNoMatchesKey(s, key));
    if (idx !== -1) return idx;
  }
  return -1;
}
function findStudentByRefDigits(str) {
  const i = findStudentIndexByRefDigits(str);
  return i === -1 ? null : state.students[i];
}

function onRefTwoDigitChange() {
  const el = document.getElementById('opt-ref-two-digit');
  state.refRequireTwoDigits = el ? el.checked : true;
  autoSave();
}
function applyRefTwoDigitFromState() {
  const el = document.getElementById('opt-ref-two-digit');
  if (!el) return;
  if (typeof state.refRequireTwoDigits === 'boolean') el.checked = state.refRequireTwoDigits;
  else state.refRequireTwoDigits = el.checked;
}

function setSetupSelectsLoading(isLoading, phase) {
  const cls = document.getElementById('class-select');
  const task = document.getElementById('task-select');
  if (!cls || !task) return;
  cls.disabled = isLoading;
  task.disabled = isLoading;
  if (isLoading) {
    cls.classList.add('setup-loading');
    task.classList.add('setup-loading');
    if (phase === 'classes') {
      cls.innerHTML = '<option value="">クラス一覧を読み込み中...</option>';
      task.innerHTML = '<option value="">お待ちください...</option>';
    } else if (phase === 'roster') {
      task.innerHTML = '<option value="">名簿・入力項目を読み込み中...</option>';
    }
  } else {
    cls.classList.remove('setup-loading');
    task.classList.remove('setup-loading');
  }
}

window.onload = () => {
  // Check if there is a saved state
  google.script.run.withSuccessHandler(savedState => {
    if (savedState && savedState.currentClass && savedState.results) {
      if (confirm("前回の入力途中のデータがあります。再開しますか？\n（キャンセルすると破棄して新規開始します）")) {
        state = savedState;
        if (typeof state.processCounter !== 'number') state.processCounter = 0;
        if (!state.processOrderByRow) state.processOrderByRow = {};
        if (typeof state.focusUnansweredOnly !== 'boolean') state.focusUnansweredOnly = false;
        if (!state.dirtySheetRows) state.dirtySheetRows = {};
        restoreStateUI();
        return;
      } else {
        google.script.run.clearUserState();
      }
    }
    // Normal start
    isAdminUser = !!document.getElementById('admin-panel');
    applyRefTwoDigitFromState();
    loadBookTypeAvailabilityAndStart();
  }).loadUserState();
};

function findFirstUnansweredIndex() {
  const idx = state.results.findIndex(r => r === "" || r === null);
  return idx === -1 ? 0 : idx;
}

function restoreStateUI() {
  document.getElementById('setup-view').style.display = 'none';
  
  // Restore Book Type toggle visually
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  let toggleId = state.bookType === 'quiz_pf' ? 'quiz_pf' : (state.bookType === 'quiz_score' ? 'quiz_score' : 'assign');
  document.getElementById(`book-toggle-${toggleId}`).classList.add('active');

  const headerText = state.taskDate ? `${state.taskDate} 登録 : ${state.taskName}` : state.taskName;
  if (document.getElementById('seq-task-header')) document.getElementById('seq-task-header').innerText = headerText;
  if (document.getElementById('ref-task-header')) document.getElementById('ref-task-header').innerText = headerText;

  applyRefTwoDigitFromState();

  if (state.mode === 1) {
    state.currentIndex = findFirstUnansweredIndex();
    document.getElementById('sequential-view').style.display = 'flex';
    setupSeqView();
    updateSeqDisplay();
  } else if (state.mode === 2) {
    google.script.run.withSuccessHandler(() => {
      document.getElementById('reference-view').style.display = 'flex';
      setupRefView();
    }).withFailureHandler(err => {
      alert('番号参照用シートの同期に失敗しました: ' + err.message);
      showSetup();
    }).ensureRefOrderSheet(state.bookType, state.currentClass);
  } else {
    showSetup();
  }
}

function setBookType(type) {
  if (!availableBookTypes[type]) {
    const fallback = pickFirstAvailableBookType();
    if (!fallback) return;
    type = fallback;
  }
  state.bookType = type;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  let toggleId = type === 'quiz_pf' ? 'quiz_pf' : (type === 'quiz_score' ? 'quiz_score' : 'assign');
  document.getElementById(`book-toggle-${toggleId}`).classList.add('active');
  reloadClassList();
}

function reloadClassList() {
  setSetupSelectsLoading(true, 'classes');
  google.script.run.withSuccessHandler(list => {
    const select = document.getElementById('class-select');
    select.innerHTML = '';
    if (!list || list.length === 0) {
      select.innerHTML = '<option value="">（利用可能なクラスがありません）</option>';
      document.getElementById('task-select').innerHTML = '<option value="">—</option>';
      setSetupSelectsLoading(false);
      return;
    }
    list.forEach(jsonStr => {
      let item = JSON.parse(jsonStr);
      let opt = document.createElement('option');
      opt.value = jsonStr;
      opt.text = item.displayName;
      select.add(opt);
    });
    setSetupSelectsLoading(true, 'roster');
    loadClassData();
  }).withFailureHandler(err => {
    setSetupSelectsLoading(false);
    alert("クラス一覧の取得に失敗しました: " + err.message);
  }).getClassList(state.bookType);
}

function loadClassData() {
  const className = document.getElementById('class-select').value;
  if (!className) {
    setSetupSelectsLoading(false);
    return;
  }
  setSetupSelectsLoading(true, 'roster');
  
  google.script.run.withSuccessHandler(data => {
    if (!data) {
      setSetupSelectsLoading(false);
      alert("クラスデータの読み込みに失敗しました。");
      return;
    }
    state.students = data.students;
    state.results = new Array(data.students.length).fill("");
    state.dirtySheetRows = {};
    state.currentClass = className;
    
    const taskSel = document.getElementById('task-select');
    taskSel.innerHTML = '<option value="">入力内容を選んでください</option>';
    
    let newOpt = document.createElement('option');
    newOpt.value = 'new';
    newOpt.text = state.bookType.startsWith('quiz') ? 'ー新規小テスト情報を登録ー' : 'ー新規提出物情報を登録ー';
    taskSel.add(newOpt);
    
    data.tasks.forEach(t => {
      let opt = document.createElement('option');
      opt.value = t.colIndex; 
      opt.text = `${t.name} (${t.date})`; 
      opt.dataset.name = t.name;
      opt.dataset.date = t.date;
      taskSel.add(opt);
    });
    
    taskSel.onchange = checkNewTask;
    setSetupSelectsLoading(false);
  }).withFailureHandler(err => {
    setSetupSelectsLoading(false);
    alert("名簿の読み込みに失敗しました: " + err.message);
  }).getClassData(state.bookType, className);
}

function checkNewTask() {
  const taskSel = document.getElementById('task-select');
  if (taskSel.value === 'new') {
    if (confirm("新規追加しますか？")) {
      document.getElementById('new-task-title').innerText = state.bookType.startsWith('quiz') ? "新規小テスト作成" : "新規提出物作成";
      document.getElementById('new-task-date').value = "";
      document.getElementById('new-task-name').value = "";
      document.getElementById('new-task-modal').style.display = 'flex';
    } else {
      taskSel.value = ""; // キャンセル時はリセット
    }
  }
}

function closeNewTaskModal() {
  document.getElementById('new-task-modal').style.display = 'none';
  const taskSel = document.getElementById('task-select');
  if (taskSel.value === 'new') taskSel.value = "";
}

function saveNewTask() {
  const dateStr = document.getElementById('new-task-date').value.trim();
  const nameStr = document.getElementById('new-task-name').value.trim();
  if (!dateStr || !nameStr) {
    alert("日付と名称を入力してください。");
    return;
  }
  
  document.getElementById('new-task-save-btn').disabled = true;
  document.getElementById('new-task-save-btn').innerText = "保存中...";
  
  google.script.run.withSuccessHandler(() => {
    document.getElementById('new-task-modal').style.display = 'none';
    document.getElementById('new-task-save-btn').disabled = false;
    document.getElementById('new-task-save-btn').innerText = "保存して追加";
    loadClassData(); // 再読み込み
  }).withFailureHandler(err => {
    alert("エラー: " + err.message);
    document.getElementById('new-task-save-btn').disabled = false;
    document.getElementById('new-task-save-btn').innerText = "保存して追加";
  }).createNewTask(state.bookType, state.currentClass, dateStr, nameStr);
}

window.parsedTSVData = [];

function parseTSV() {
  const text = document.getElementById('tsv-data').value.trim();
  if (!text) {
    alert("TSVデータが入力されていません。");
    return;
  }
  
  window.parsedTSVData = text.split('\n').map(line => line.split('\t'));
  if (window.parsedTSVData.length === 0) return;
  
  const firstRow = window.parsedTSVData[0];
  const container = document.getElementById('tsv-columns');
  container.innerHTML = '';
  
  firstRow.forEach((val, i) => {
    let div = document.createElement('div');
    div.className = 'input-group';
    div.style.display = 'flex';
    div.style.alignItems = 'center';
    div.style.marginBottom = '10px';
    
    let sample = document.createElement('div');
    sample.style.flex = '1';
    sample.style.overflow = 'hidden';
    sample.style.textOverflow = 'ellipsis';
    sample.style.whiteSpace = 'nowrap';
    sample.innerText = `[${i+1}列目] ${val}`;
    
    let select = document.createElement('select');
    select.className = 'tsv-map-select';
    select.style.flex = '1';
    select.style.padding = '8px';
    select.innerHTML = `
      <option value="ignore">-- 無視する --</option>
      <option value="name">氏名</option>
      <option value="id">ID</option>
      <option value="group">組</option>
      <option value="no">番号</option>
      <option value="gender">性別</option>
    `;
    
    div.appendChild(sample);
    div.appendChild(select);
    container.appendChild(div);
  });
  
  document.getElementById('tsv-mapping-container').style.display = 'block';
}

function executeTSVImport() {
  const bookType = document.getElementById('tsv-target-book').value;
  let className = document.getElementById('tsv-class-name').value.trim();
  if (!className) {
    alert("シート名を入力してください。");
    return;
  }
  if (!className.endsWith('＠入力')) {
    className += '＠入力';
  }
  
  const selects = document.querySelectorAll('.tsv-map-select');
  const mapping = Array.from(selects).map(s => s.value);
  
  document.getElementById('btn-execute-tsv').disabled = true;
  document.getElementById('btn-execute-tsv').innerText = "登録中...";
  
  google.script.run.withSuccessHandler(() => {
    alert("インポートが完了しました。");
    document.getElementById('btn-execute-tsv').disabled = false;
    document.getElementById('btn-execute-tsv').innerText = "スプレッドシートに登録";
    document.getElementById('tsv-data').value = "";
    document.getElementById('tsv-mapping-container').style.display = 'none';
    reloadClassList();
  }).withFailureHandler(err => {
    alert("エラー: " + err.message);
    document.getElementById('btn-execute-tsv').disabled = false;
    document.getElementById('btn-execute-tsv').innerText = "スプレッドシートに登録";
  }).importRosterFromTSV(bookType, className, window.parsedTSVData, mapping);
}

// --- 管理者設定の制御 ---
function openAdminSettings() {
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('admin-view').style.display = 'flex';
  
  google.script.run.withSuccessHandler(settings => {
    document.getElementById('admin-assign-id').value = settings.ASSIGNMENT_SS_ID || '';
    document.getElementById('admin-quiz-pf-id').value = settings.QUIZ_PF_SS_ID || '';
    document.getElementById('admin-quiz-score-id').value = settings.QUIZ_SCORE_SS_ID || '';
    
    document.getElementById('admin-header-row').value = settings.HEADER_ROWS || '5';
    document.getElementById('admin-roster-cols').value = settings.ROSTER_COLS || '7';
    
    window.adminTempMaps = {
      name: settings.COL_MAP_NAME || 3,
      id: settings.COL_MAP_ID || 2,
      cls: settings.COL_MAP_CLASS || 0,
      num: settings.COL_MAP_NUMBER || 1
    };
    
    if (settings.ASSIGNMENT_SS_ID) {
      fetchHeaders();
    }
  }).getAdminSettings();
}

function fetchHeaders() {
  const row = document.getElementById('admin-header-row').value;
  document.getElementById('mapping-selectors').style.display = 'block';
  
  const selects = ['map-name', 'map-id', 'map-class', 'map-num'].map(id => document.getElementById(id));
  selects.forEach(s => s.innerHTML = '<option>読み込み中...</option>');
  
  google.script.run.withSuccessHandler(headers => {
    if(!headers || headers.length === 0) {
      selects.forEach(s => s.innerHTML = '<option value="">見出しなし</option>');
      return;
    }
    
    selects.forEach(s => s.innerHTML = '');
    headers.forEach((h, i) => {
      selects.forEach(s => {
        let opt = document.createElement('option');
        opt.value = i; 
        opt.text = `[${i+1}列目] ${h}`;
        s.appendChild(opt);
      });
    });
    
    if(window.adminTempMaps) {
      document.getElementById('map-name').value = window.adminTempMaps.name;
      document.getElementById('map-id').value = window.adminTempMaps.id;
      document.getElementById('map-class').value = window.adminTempMaps.cls;
      document.getElementById('map-num').value = window.adminTempMaps.num;
    }
  }).getHeadersFromSheet(row);
}

function saveSettings() {
  const assignId = document.getElementById('admin-assign-id').value.trim();
  const quizPfId = document.getElementById('admin-quiz-pf-id').value.trim();
  const quizScoreId = document.getElementById('admin-quiz-score-id').value.trim();
  
  const mapName = document.getElementById('map-name').value;
  const mapId = document.getElementById('map-id').value;
  const mapClass = document.getElementById('map-class').value;
  const mapNum = document.getElementById('map-num').value;
  const rosterCols = document.getElementById('admin-roster-cols').value;
  const headerRows = document.getElementById('admin-header-row').value;
  
  document.querySelectorAll('button').forEach(b => b.disabled = true);
  
  google.script.run.withSuccessHandler(() => {
    alert("設定を保存し、A1セルへの反映を行いました。");
    document.querySelectorAll('button').forEach(b => b.disabled = false);
    showSetup();
    reloadClassList(); 
  }).withFailureHandler(err => {
    alert("エラー: " + err.message);
    document.querySelectorAll('button').forEach(b => b.disabled = false);
  }).saveAdminSettingsFromUI(assignId, quizPfId, quizScoreId, mapName, mapId, mapClass, mapNum, rosterCols, headerRows);
}

// --- 入力モードの制御 ---
function startMode(mode) {
  applyRefTwoDigitFromState();
  const taskSel = document.getElementById('task-select');
  state.taskIndex = taskSel.value;
  
  if (!state.taskIndex || state.taskIndex === 'new') {
    alert("入力内容を選択してください。");
    return;
  }
  if (!state.students || state.students.length === 0) {
    alert("名簿が読み込まれていません。クラスを選び直すか、少し待ってから再度お試しください。");
    return;
  }

  const selectedOpt = taskSel.options[taskSel.selectedIndex];
  state.taskName = selectedOpt.dataset.name || "";
  state.taskDate = selectedOpt.dataset.date || "";
  state.lastAction = null;
  state.focusUnansweredOnly = false;
  
  state.mode = mode;
  const headerText = state.taskDate ? `${state.taskDate} 登録 : ${state.taskName}` : state.taskName;
  if (document.getElementById('seq-task-header')) document.getElementById('seq-task-header').innerText = headerText;
  if (document.getElementById('ref-task-header')) document.getElementById('ref-task-header').innerText = headerText;
  
  if (mode === 1) {
    document.getElementById('setup-view').style.display = 'none';
    state.currentIndex = findFirstUnansweredIndex();
    document.getElementById('sequential-view').style.display = 'flex';
    setupSeqView();
    updateSeqDisplay();
    autoSave();
  } else {
    google.script.run.withSuccessHandler(() => {
      document.getElementById('setup-view').style.display = 'none';
      document.getElementById('reference-view').style.display = 'flex';
      setupRefView();
      autoSave();
    }).withFailureHandler(err => {
      alert('番号参照用シートの準備に失敗しました: ' + err.message);
      state.mode = 0;
    }).ensureRefOrderSheet(state.bookType, state.currentClass);
  }
}

function autoSave() {
  google.script.run.saveUserState(state);
}

function saveAndExit() {
  autoSave();
  showSetup();
}

function showSetup() {
  applyRefTwoDigitFromState();
  document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
  document.getElementById('setup-view').style.display = 'flex';
}

// ==========================================
// Mode 1: 順次入力 (Sequential)
// ==========================================
function setupSeqView() {
  document.getElementById('seq-assign-actions').style.display = 'none';
  document.getElementById('seq-quiz-pf-actions').style.display = 'none';
  document.getElementById('seq-quiz-score-actions').style.display = 'none';
  
  if (state.bookType === 'assignment') {
    document.getElementById('seq-assign-actions').style.display = 'grid';
  } else if (state.bookType === 'quiz_pf') {
    document.getElementById('seq-quiz-pf-actions').style.display = 'grid';
  } else if (state.bookType === 'quiz_score') {
    document.getElementById('seq-quiz-score-actions').style.display = 'block';
    tempNumStr = "";
    document.getElementById('seq-quiz-score').innerText = "_";
  }
}

function updateSeqDisplay() {
  const studentIndex = getCurrentStudentIndex();
  const s = state.students[studentIndex];
  document.getElementById('seq-name-text').innerText = `${s.no}番：${s.name}`;
  const working = getCurrentWorkingIndices();
  const currentPos = Math.min(state.currentIndex + 1, Math.max(working.length, 1));
  const label = state.focusUnansweredOnly ? "未入力" : "人目";
  document.getElementById('seq-current-info').innerText = `${currentPos} / ${working.length} ${label}`;
  
  const currentVal = state.results[studentIndex];
  const badge = document.getElementById('seq-status-badge');
  if (currentVal !== "" && currentVal !== null) {
    badge.innerText = `[入力済: ${currentVal}]`;
    badge.style.color = '#188038';
  } else {
    badge.innerText = `[未入力]`;
    badge.style.color = '#ea4335';
  }

  if (state.lastAction) {
    document.getElementById('seq-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
  } else {
    document.getElementById('seq-last-action').innerText = ``;
  }
  
  if (working.length <= 1 || state.currentIndex === working.length - 1) {
    document.getElementById('submit-btn-seq').style.display = 'block';
  } else {
    document.getElementById('submit-btn-seq').style.display = 'none';
  }

  // Quiz mode: show current score if already input
  if (state.bookType === 'quiz_score') {
    if (currentVal !== "" && currentVal !== null) {
      document.getElementById('seq-quiz-score').innerText = currentVal;
      document.getElementById('seq-quiz-score').style.color = currentVal === '休' ? '#351c75' : '#188038'; // purple or green
      tempNumStr = String(currentVal);
    } else {
      document.getElementById('seq-quiz-score').innerText = "_";
      document.getElementById('seq-quiz-score').style.color = '#1a73e8';
      tempNumStr = "";
    }
  }
}

function prevStudent() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    updateSeqDisplay();
  }
}

function nextStudent() {
  const working = getCurrentWorkingIndices();
  if (state.currentIndex < working.length - 1) {
    state.currentIndex++;
    updateSeqDisplay();
  }
}

// Mode 1 Assign actions
function recordSeqAssign(val) {
  const studentIndex = getCurrentStudentIndex();
  state.lastAction = { name: state.students[studentIndex].name, val: val };
  state.results[studentIndex] = val;
  markDirtyByStudentIndex(studentIndex);
  autoSave();
  const working = getCurrentWorkingIndices();
  if (state.currentIndex < working.length - 1) {
    state.currentIndex++;
    updateSeqDisplay();
  } else {
    updateSeqDisplay(); // Refresh to show submit button
  }
}

// Mode 1 Quiz actions
function kpSeq(val) {
  const display = document.getElementById('seq-quiz-score');
  display.style.color = '#333';
  if (typeof val === 'number') {
    tempNumStr += val;
    display.innerText = tempNumStr;
  } else if (val === 'Del') {
    tempNumStr = tempNumStr.slice(0, -1);
    display.innerText = tempNumStr || "_";
  } else if (val === 'Enter') {
    if (tempNumStr !== "") {
      const studentIndex = getCurrentStudentIndex();
      state.lastAction = { name: state.students[studentIndex].name, val: tempNumStr };
      state.results[studentIndex] = tempNumStr;
      markDirtyByStudentIndex(studentIndex);
      autoSave();
      const working = getCurrentWorkingIndices();
      if (state.currentIndex < working.length - 1) {
        state.currentIndex++;
        updateSeqDisplay();
      } else {
        updateSeqDisplay();
      }
    }
  }
}

// ==========================================
// Mode 2: 番号参照入力 (Reference)
// ==========================================
function clearRefScoreLive() {
  const el = document.getElementById('ref-score-live');
  if (el) el.textContent = '';
}

function refTransitionToQuizScore(idx) {
  refTargetIdx = idx;
  refQuizState = "score";
  tempScoreStr = "";
  syncQuizScoreDisplay();
  const statusEl = document.getElementById('ref-status-display');
  document.getElementById('ref-name-display').innerText = state.students[idx].name;
  document.getElementById('ref-status-badge').innerText = "";
  clearRefScoreLive();
  statusEl.innerText = "【得点 入力】";
  statusEl.style.color = '#e37400';
}

function tryAutoEnterQuizScoreFromTwoDigits() {
  if (state.bookType !== 'quiz_score' || refQuizState !== 'number') return;
  if (!state.refRequireTwoDigits || tempNumStr.length !== 2) return;
  const idx = findStudentIndexByRefDigits(tempNumStr);
  if (idx !== -1) {
    refTransitionToQuizScore(idx);
  }
}

function setupRefView() {
  tempNumStr = "";
  tempScoreStr = "";
  clearAllRefInputs();
  refQuizState = "number";
  refTargetIdx = -1;
  clearRefScoreLive();
  setRefRowLayout();
  
  document.getElementById('ref-status-badge').innerText = "";
  document.getElementById('ref-name-display').innerText = "—";
  if (state.lastAction) {
    document.getElementById('ref-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
  } else {
    document.getElementById('ref-last-action').innerText = ``;
  }

  const numKp = document.getElementById('ref-number-keypad');
  if (state.bookType === 'assignment') {
    numKp.style.display = 'grid';
    document.getElementById('ref-assign-keypad').style.display = 'grid';
    document.getElementById('ref-quiz-pf-keypad').style.display = 'none';
    document.getElementById('ref-quiz-score-keypad').style.display = 'none';
    document.getElementById('ref-status-display').innerText = "【出席番号 入力】";
    document.getElementById('ref-status-display').style.color = '#1a73e8';
  } else if (state.bookType === 'quiz_pf') {
    numKp.style.display = 'grid';
    document.getElementById('ref-assign-keypad').style.display = 'none';
    document.getElementById('ref-quiz-pf-keypad').style.display = 'grid';
    document.getElementById('ref-quiz-score-keypad').style.display = 'none';
    document.getElementById('ref-status-display').innerText = "【出席番号 入力】";
    document.getElementById('ref-status-display').style.color = '#1a73e8';
  } else if (state.bookType === 'quiz_score') {
    numKp.style.display = 'none';
    document.getElementById('ref-assign-keypad').style.display = 'none';
    document.getElementById('ref-quiz-pf-keypad').style.display = 'none';
    document.getElementById('ref-quiz-score-keypad').style.display = 'grid';
    refQuizState = "number";
    document.getElementById('ref-status-display').innerText = "【出席番号 入力】";
    document.getElementById('ref-status-display').style.color = '#1a73e8';
  }
}

// --- Mode 2 Assign ---
function kpRef(val) {
  const nameEl = document.getElementById('ref-name-display');
  const inputEl = document.getElementById('ref-input');
  const statusEl = document.getElementById('ref-status-display');
  const badge = document.getElementById('ref-status-badge');
  
  if (typeof val === 'number') {
    tempNumStr += String(val);
    inputEl.value = tempNumStr;
    const student = findStudentByRefDigits(tempNumStr);
    if (student) {
      const idx = findStudentIndexByRefDigits(tempNumStr);
      const currentVal = state.results[idx];
      nameEl.innerText = student.name;
      if (currentVal !== "" && currentVal !== null) {
        badge.innerText = `[入力済: ${currentVal}]`;
        badge.style.color = '#188038';
      } else {
        badge.innerText = `[未入力]`;
        badge.style.color = '#ea4335';
      }
    } else {
      nameEl.innerText = "該当なし";
      badge.innerText = "";
    }
    statusEl.innerText = "【出席番号 入力】";
    statusEl.style.color = '#1a73e8';
  } else if (val === 'Del') {
    tempNumStr = tempNumStr.slice(0, -1);
    inputEl.value = tempNumStr;
    if(!tempNumStr) {
      nameEl.innerText = "—";
      badge.innerText = "";
    } else {
      const student = findStudentByRefDigits(tempNumStr);
      if (student) {
        nameEl.innerText = student.name;
        const idx = findStudentIndexByRefDigits(tempNumStr);
        const currentVal = state.results[idx];
        if (currentVal !== "" && currentVal !== null) {
          badge.innerText = `[入力済: ${currentVal}]`;
          badge.style.color = '#188038';
        } else {
          badge.innerText = `[未入力]`;
          badge.style.color = '#ea4335';
        }
      } else {
        nameEl.innerText = "該当なし";
        badge.innerText = "";
      }
    }
    statusEl.innerText = "【出席番号 入力】";
    statusEl.style.color = '#1a73e8';
  } else if (val === 'Clear') {
    resetRefInputState();
  }
}

function recordRefAssign(val) {
  const nameEl = document.getElementById('ref-name-display');
  const statusEl = document.getElementById('ref-status-display');
  
  let idx = -1;
  if (state.bookType === 'quiz_score' && refQuizState === 'score' && refTargetIdx >= 0) {
    idx = refTargetIdx;
  } else {
    idx = findStudentIndexByRefDigits(tempNumStr);
  }
  if (idx === -1) {
    alert("先に出席番号をテンキーで入力し、氏名が表示される状態でタイルを押してください。");
    return;
  }
  state.lastAction = { name: state.students[idx].name, val: val };
  state.results[idx] = val;
  markProcessOrderByStudentIndex(idx);
  markDirtyByStudentIndex(idx);
  autoSave();
  nameEl.innerText = `${state.students[idx].name} → [${val}] 保存`;
  nameEl.style.color = val === '休' ? '#351c75' : '#188038';
  document.getElementById('ref-status-badge').innerText = "";
  clearRefScoreLive();
  document.getElementById('ref-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
  if (state.bookType === 'quiz_score') {
    refQuizState = 'number';
    refTargetIdx = -1;
    tempScoreStr = "";
    statusEl.innerText = "【出席番号 入力】";
    statusEl.style.color = '#1a73e8';
  }
  
  setTimeout(() => { 
    resetRefInputState();
  }, 800);
}

// --- Mode 2 Quiz（点数）：左＝番号＋「番」／中央＝氏名／右＝点数＋「点」---
function kpRefQuiz(val) {
  if (val === 'Clear') {
    resetRefInputState();
    return;
  }
  const nameEl = document.getElementById('ref-name-display');
  const statusEl = document.getElementById('ref-status-display');
  
  if (refQuizState === "number") {
    if (typeof val === 'number') {
      tempNumStr = (tempNumStr + String(val)).slice(0, 2);
      syncQuizNumDisplay();
      clearRefScoreLive();
      const badge = document.getElementById('ref-status-badge');
      const student = findStudentByRefDigits(tempNumStr);
      if (student) {
        nameEl.innerText = student.name;
        const currentVal = state.results[findStudentIndexByRefDigits(tempNumStr)];
        if (currentVal !== "" && currentVal !== null) {
          badge.innerText = `[入力済: ${currentVal}]`;
          badge.style.color = '#188038';
          statusEl.innerText = state.refRequireTwoDigits ? "【得点入力へ自動移行（2桁一致時）】" : "【Enterで得点へ】";
          statusEl.style.color = '#d93025';
        } else {
          badge.innerText = `[未入力]`;
          badge.style.color = '#ea4335';
          statusEl.innerText = state.refRequireTwoDigits ? "【出席番号 入力】" : "【Enter または 確定】";
          statusEl.style.color = '#1a73e8';
        }
      } else {
        nameEl.innerText = "該当なし";
        badge.innerText = "";
      }
      tryAutoEnterQuizScoreFromTwoDigits();
    } else if (val === 'Del') {
      tempNumStr = tempNumStr.slice(0, -1);
      syncQuizNumDisplay();
      clearRefScoreLive();
      const badge = document.getElementById('ref-status-badge');
      if (!tempNumStr) {
        nameEl.innerText = "—";
        badge.innerText = "";
      } else {
        const student = findStudentByRefDigits(tempNumStr);
        if (student) {
          nameEl.innerText = student.name;
          const currentVal = state.results[findStudentIndexByRefDigits(tempNumStr)];
          if (currentVal !== "" && currentVal !== null) {
            badge.innerText = `[入力済: ${currentVal}]`;
            badge.style.color = '#188038';
          } else {
            badge.innerText = `[未入力]`;
            badge.style.color = '#ea4335';
          }
        } else {
          nameEl.innerText = "該当なし";
          badge.innerText = "";
        }
      }
    } else if (val === 'Enter') {
      const idx = findStudentIndexByRefDigits(tempNumStr);
      if (idx !== -1) {
        refTransitionToQuizScore(idx);
      }
    }
  } 
  else if (refQuizState === "score") {
    if (typeof val === 'number') {
      tempScoreStr = (tempScoreStr + String(val)).slice(0, 2);
      syncQuizScoreDisplay();
    } else if (val === 'Del') {
      tempScoreStr = tempScoreStr.slice(0, -1);
      syncQuizScoreDisplay();
    } else if (val === 'Enter') {
      if (tempScoreStr !== "") {
        state.lastAction = { name: state.students[refTargetIdx].name, val: tempScoreStr + "点" };
        state.results[refTargetIdx] = tempScoreStr;
        markProcessOrderByStudentIndex(refTargetIdx);
        markDirtyByStudentIndex(refTargetIdx);
        autoSave();
        nameEl.innerText = `保存: ${state.students[refTargetIdx].name}`;
        nameEl.style.color = '#188038';
        document.getElementById('ref-status-badge').innerText = "";
        statusEl.innerText = "";
        document.getElementById('ref-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
        
        setTimeout(() => {
          resetRefInputState();
        }, 800);
      }
    }
  }
}

// ==========================================
// スプレッドシートへの一括書き込み
// ==========================================
function confirmData() {
  if (state.mode === 2) {
    const missingStudents = getMissingStudents();
    if (missingStudents.length > 0) {
      const setAbsent = confirm(buildMissingStudentsMessage(missingStudents));
      if (setAbsent) {
        for (let i = 0; i < state.students.length; i++) {
          if (state.results[i] === "" || state.results[i] === null) {
            state.results[i] = "休";
            markDirtyByStudentIndex(i);
          }
        }
      } else {
        state.mode = 1;
        state.focusUnansweredOnly = true;
        state.currentIndex = 0;
        document.getElementById('reference-view').style.display = 'none';
        document.getElementById('sequential-view').style.display = 'flex';
        setupSeqView();
        updateSeqDisplay();
        autoSave();
        return;
      }
    }
  }

  let partialValues = false;
  let partialProcessOrder = false;

  if (isAdminUser) {
    if (!confirm('スプレッドシートに保存しますか？\n\n「キャンセル」＝アプリ内のみ保存してホームに戻り、あとから続きの入力ができます。')) {
      autoSave();
      alert('アプリ内に保存しました。');
      showSetup();
      return;
    }
    partialValues = confirm('今回変更した生徒だけを保存しますか？\n\nOK＝部分確定（変更行のみ）\nキャンセル＝まとめて確定（番号参照の入力順は該当列を全行クリアしてから一括）');
    partialProcessOrder = partialValues && state.mode === 2;
  }

  if (partialValues) {
    const dirtyKeys = state.dirtySheetRows ? Object.keys(state.dirtySheetRows) : [];
    if (dirtyKeys.length === 0) {
      alert('今回保存する変更がありません。');
      return;
    }
  }

  if (!isAdminUser) {
    if (!confirm("入力データをスプレッドシートに反映しますか？\n（確定後、一時保存データは消去されます）")) return;
  } else if (partialValues) {
    if (!confirm("今回分のみスプレッドシートに反映します。\nアプリ内の入力は保持されます。よろしいですか？")) return;
  } else {
    if (!confirm("すべてのデータをスプレッドシートに反映します。\n（確定後、一時保存データは消去されます）")) return;
  }

  const resultsWithRow = buildResultsPayloadForSubmit(isAdminUser && partialValues);
  if (partialValues && resultsWithRow.length === 0) {
    alert('保存対象の入力がありません（変更した生徒に値が入っていません）。');
    return;
  }

  const processPayload = state.mode === 2 ? buildProcessOrderPayload(isAdminUser && partialProcessOrder) : {};
  const writeProcessOrder = state.mode === 2 && Object.keys(processPayload).length > 0;
  const skipClearUserState = !!(isAdminUser && partialValues);

  const submitOptions = {
    partialValues: !!(isAdminUser && partialValues),
    partialProcessOrder: !!(isAdminUser && partialProcessOrder),
    writeProcessOrder: writeProcessOrder,
    skipClearUserState: skipClearUserState
  };

  withSaveLoading(unlock => {
    google.script.run.withSuccessHandler(url => {
      alert(skipClearUserState ? "保存しました（続きを入力できます）。" : "保存が完了しました。");
      unlock();
      if (confirm("スプレッドシートを開いて確認しますか？")) {
        window.open(url, '_blank');
      }
      if (skipClearUserState) {
        resultsWithRow.forEach(item => {
          if (state.dirtySheetRows) delete state.dirtySheetRows[String(item.sheetRow)];
        });
        autoSave();
      } else {
        state.results = new Array(state.students.length).fill("");
        state.currentIndex = findFirstUnansweredIndex();
        state.processCounter = 0;
        state.processOrderByRow = {};
        state.dirtySheetRows = {};
        state.focusUnansweredOnly = false;
        showSetup();
      }
    }).withFailureHandler(err => {
      unlock();
      alert("エラーが発生しました: " + err.message);
    }).submitAttendanceData(state.bookType, state.currentClass, state.taskIndex, state.taskName, resultsWithRow, processPayload, submitOptions);
  });
}

function approveAndNext() {
  if (!isAdminUser) return;
  if (state.mode === 1) {
    if (state.currentIndex < getCurrentWorkingIndices().length - 1) {
      state.currentIndex++;
      updateSeqDisplay();
    } else {
      alert("最後の生徒です。");
    }
    return;
  }
  if (state.mode === 2) {
    resetRefInputState();
  }
}

function createSecondarySheet(sortDirection) {
  withSaveLoading(unlock => {
    google.script.run.withSuccessHandler(url => {
      unlock();
      alert("教員の二次点検票を作成しました。");
      if (confirm("作成したスプレッドシートを開きますか？")) {
        window.open(url, '_blank');
      }
    }).withFailureHandler(err => {
      unlock();
      alert("二次点検票の作成に失敗しました: " + err.message);
    }).createSecondaryCheckSheet(
      state.bookType,
      state.currentClass,
      state.taskIndex,
      state.taskName,
      sortDirection
    );
  });
}

// ②番号参照：物理キー（数字・Del・Enter・ショートカット）
(function initRefPhysicalKeys() {
  const KEY_ASSIGN = { t: '提', T: '提', と: '提', て: '提', m: '未', M: '未', み: '未', s: '再', S: '再', さ: '再', ざ: '再', z: '再', Z: '再', y: '休', Y: '休', や: '休', ゆ: '休' };
  const KEY_PF = { g: '○', G: '○', ご: '○', f: '×', F: '×', ふ: '×', y: '休', Y: '休', や: '休', ゆ: '休' };

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.repeat) return;
    if (e.isComposing) return;
    const refV = document.getElementById('reference-view');
    if (!refV || refV.style.display !== 'flex') return;
    const modal = document.getElementById('new-task-modal');
    if (modal && modal.style.display === 'flex') return;

    const t = e.target;
    if (t && t.tagName === 'TEXTAREA') return;
    if (t && t.tagName === 'INPUT') {
      const allowReadonly = ['ref-input', 'ref-q-num', 'ref-q-score'];
      if (!allowReadonly.includes(t.id) && !t.readOnly) return;
    }

    const bt = state.bookType;
    const ch = e.key;

    if (ch >= '0' && ch <= '9') {
      e.preventDefault();
      const n = parseInt(ch, 10);
      if (bt === 'quiz_score') kpRefQuiz(n);
      else kpRef(n);
      return;
    }
    if (ch === 'Backspace') {
      e.preventDefault();
      if (bt === 'quiz_score') kpRefQuiz('Del');
      else kpRef('Del');
      return;
    }
    if (ch === 'Enter') {
      e.preventDefault();
      if (bt === 'quiz_score') kpRefQuiz('Enter');
      return;
    }
    if (ch === 'Escape') {
      e.preventDefault();
      resetRefInputState();
      return;
    }

    if (bt === 'assignment' && KEY_ASSIGN[ch]) {
      e.preventDefault();
      recordRefAssign(KEY_ASSIGN[ch]);
      return;
    }
    if (bt === 'quiz_pf' && KEY_PF[ch]) {
      e.preventDefault();
      recordRefAssign(KEY_PF[ch]);
      return;
    }
  }, true);
})();

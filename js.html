<script>
let state = {
  bookType: 'assignment', // 'assignment' or 'quiz'
  currentClass: '',
  taskIndex: 0,
  taskName: '',
  taskDate: '',
  mode: 0, // 1 or 2
  students: [],
  results: [],
  currentIndex: 0,
  lastAction: null
};

// Mode 2 local vars
let tempNumStr = "";
let refQuizState = "number"; // "number" or "score"
let refTargetIdx = -1;

window.onload = () => {
  // Check if there is a saved state
  google.script.run.withSuccessHandler(savedState => {
    if (savedState && savedState.currentClass && savedState.results) {
      if (confirm("前回の入力途中のデータがあります。再開しますか？\n（キャンセルすると破棄して新規開始します）")) {
        state = savedState;
        restoreStateUI();
        return;
      } else {
        google.script.run.clearUserState();
      }
    }
    // Normal start
    setBookType('assignment');
  }).loadUserState();
};

function findFirstUnansweredIndex() {
  const idx = state.results.findIndex(r => r === "" || r === null);
  return idx === -1 ? 0 : idx;
}

function restoreStateUI() {
  document.getElementById('setup-view').style.display = 'none';
  
  // Restore Book Type toggle visually
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`book-toggle-${state.bookType === 'quiz' ? 'quiz' : 'assign'}`).classList.add('active');

  const headerText = state.taskDate ? `${state.taskDate} 登録 : ${state.taskName}` : state.taskName;
  if (document.getElementById('seq-task-header')) document.getElementById('seq-task-header').innerText = headerText;
  if (document.getElementById('ref-task-header')) document.getElementById('ref-task-header').innerText = headerText;

  if (state.mode === 1) {
    state.currentIndex = findFirstUnansweredIndex();
    document.getElementById('sequential-view').style.display = 'flex';
    setupSeqView();
    updateSeqDisplay();
  } else if (state.mode === 2) {
    document.getElementById('reference-view').style.display = 'flex';
    setupRefView();
  } else {
    showSetup();
  }
}

function setBookType(type) {
  state.bookType = type;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`book-toggle-${type === 'quiz' ? 'quiz' : 'assign'}`).classList.add('active');
  reloadClassList();
}

function reloadClassList() {
  document.getElementById('class-select').innerHTML = '<option>読み込み中...</option>';
  document.getElementById('task-select').innerHTML = '<option value="">入力内容を選んでください</option>';
  
  google.script.run.withSuccessHandler(list => {
    const select = document.getElementById('class-select');
    select.innerHTML = '';
    list.forEach(name => {
      let opt = document.createElement('option');
      opt.value = opt.text = name;
      select.add(opt);
    });
    loadClassData();
  }).getClassList(state.bookType);
}

function loadClassData() {
  const className = document.getElementById('class-select').value;
  if (!className) return;
  
  google.script.run.withSuccessHandler(data => {
    if(!data) {
      alert("クラスデータの読み込みに失敗しました。"); return;
    }
    state.students = data.students;
    state.results = new Array(data.students.length).fill("");
    state.currentClass = className;
    
    const taskSel = document.getElementById('task-select');
    taskSel.innerHTML = '<option value="">入力内容を選んでください</option>';
    
    let newOpt = document.createElement('option');
    newOpt.value = 'new';
    newOpt.text = state.bookType === 'quiz' ? 'ー新規小テスト情報を登録ー' : 'ー新規提出物情報を登録ー';
    taskSel.add(newOpt);
    
    data.tasks.forEach(t => {
      let opt = document.createElement('option');
      opt.value = t.colIndex; 
      opt.text = `${t.name} (${t.date})`; 
      opt.dataset.name = t.name;
      opt.dataset.date = t.date;
      taskSel.add(opt);
    });
    
    taskSel.onchange = checkNewTask;
  }).getClassData(state.bookType, className);
}

function checkNewTask() {
  const taskSel = document.getElementById('task-select');
  if (taskSel.value === 'new') {
    if (confirm("新規追加しますか？")) {
      document.getElementById('new-task-title').innerText = state.bookType === 'quiz' ? "新規小テスト作成" : "新規提出物作成";
      document.getElementById('new-task-date').value = "";
      document.getElementById('new-task-name').value = "";
      document.getElementById('new-task-modal').style.display = 'flex';
    } else {
      taskSel.value = ""; // キャンセル時はリセット
    }
  }
}

function closeNewTaskModal() {
  document.getElementById('new-task-modal').style.display = 'none';
  const taskSel = document.getElementById('task-select');
  if (taskSel.value === 'new') taskSel.value = "";
}

function saveNewTask() {
  const dateStr = document.getElementById('new-task-date').value.trim();
  const nameStr = document.getElementById('new-task-name').value.trim();
  if (!dateStr || !nameStr) {
    alert("日付と名称を入力してください。");
    return;
  }
  
  document.getElementById('new-task-save-btn').disabled = true;
  document.getElementById('new-task-save-btn').innerText = "保存中...";
  
  google.script.run.withSuccessHandler(() => {
    document.getElementById('new-task-modal').style.display = 'none';
    document.getElementById('new-task-save-btn').disabled = false;
    document.getElementById('new-task-save-btn').innerText = "保存して追加";
    loadClassData(); // 再読み込み
  }).withFailureHandler(err => {
    alert("エラー: " + err.message);
    document.getElementById('new-task-save-btn').disabled = false;
    document.getElementById('new-task-save-btn').innerText = "保存して追加";
  }).createNewTask(state.bookType, state.currentClass, dateStr, nameStr);
}

window.parsedTSVData = [];

function parseTSV() {
  const text = document.getElementById('tsv-data').value.trim();
  if (!text) {
    alert("TSVデータが入力されていません。");
    return;
  }
  
  window.parsedTSVData = text.split('\n').map(line => line.split('\t'));
  if (window.parsedTSVData.length === 0) return;
  
  const firstRow = window.parsedTSVData[0];
  const container = document.getElementById('tsv-columns');
  container.innerHTML = '';
  
  firstRow.forEach((val, i) => {
    let div = document.createElement('div');
    div.className = 'input-group';
    div.style.display = 'flex';
    div.style.alignItems = 'center';
    div.style.marginBottom = '10px';
    
    let sample = document.createElement('div');
    sample.style.flex = '1';
    sample.style.overflow = 'hidden';
    sample.style.textOverflow = 'ellipsis';
    sample.style.whiteSpace = 'nowrap';
    sample.innerText = `[${i+1}列目] ${val}`;
    
    let select = document.createElement('select');
    select.className = 'tsv-map-select';
    select.style.flex = '1';
    select.style.padding = '8px';
    select.innerHTML = `
      <option value="ignore">-- 無視する --</option>
      <option value="name">氏名</option>
      <option value="id">ID</option>
      <option value="group">組</option>
      <option value="no">番号</option>
      <option value="gender">性別</option>
    `;
    
    div.appendChild(sample);
    div.appendChild(select);
    container.appendChild(div);
  });
  
  document.getElementById('tsv-mapping-container').style.display = 'block';
}

function executeTSVImport() {
  const bookType = document.getElementById('tsv-target-book').value;
  const className = document.getElementById('tsv-class-name').value.trim();
  if (!className) {
    alert("クラス名を入力してください。");
    return;
  }
  
  const selects = document.querySelectorAll('.tsv-map-select');
  const mapping = Array.from(selects).map(s => s.value);
  
  document.getElementById('btn-execute-tsv').disabled = true;
  document.getElementById('btn-execute-tsv').innerText = "登録中...";
  
  google.script.run.withSuccessHandler(() => {
    alert("インポートが完了しました。");
    document.getElementById('btn-execute-tsv').disabled = false;
    document.getElementById('btn-execute-tsv').innerText = "スプレッドシートに登録";
    document.getElementById('tsv-data').value = "";
    document.getElementById('tsv-mapping-container').style.display = 'none';
    reloadClassList();
  }).withFailureHandler(err => {
    alert("エラー: " + err.message);
    document.getElementById('btn-execute-tsv').disabled = false;
    document.getElementById('btn-execute-tsv').innerText = "スプレッドシートに登録";
  }).importRosterFromTSV(bookType, className, window.parsedTSVData, mapping);
}

// --- 管理者設定の制御 ---
function openAdminSettings() {
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('admin-view').style.display = 'flex';
  
  google.script.run.withSuccessHandler(settings => {
    document.getElementById('admin-assign-id').value = settings.ASSIGNMENT_SS_ID || '';
    document.getElementById('admin-quiz-id').value = settings.QUIZ_SS_ID || '';
    
    document.getElementById('admin-header-row').value = settings.HEADER_ROWS || '5';
    document.getElementById('admin-roster-cols').value = settings.ROSTER_COLS || '7';
    
    window.adminTempMaps = {
      name: settings.COL_MAP_NAME || 3,
      id: settings.COL_MAP_ID || 2,
      cls: settings.COL_MAP_CLASS || 0,
      num: settings.COL_MAP_NUMBER || 1
    };
    
    if (settings.ASSIGNMENT_SS_ID) {
      fetchHeaders();
    }
  }).getAdminSettings();
}

function fetchHeaders() {
  const row = document.getElementById('admin-header-row').value;
  document.getElementById('mapping-selectors').style.display = 'block';
  
  const selects = ['map-name', 'map-id', 'map-class', 'map-num'].map(id => document.getElementById(id));
  selects.forEach(s => s.innerHTML = '<option>読み込み中...</option>');
  
  google.script.run.withSuccessHandler(headers => {
    if(!headers || headers.length === 0) {
      selects.forEach(s => s.innerHTML = '<option value="">見出しなし</option>');
      return;
    }
    
    selects.forEach(s => s.innerHTML = '');
    headers.forEach((h, i) => {
      selects.forEach(s => {
        let opt = document.createElement('option');
        opt.value = i; 
        opt.text = `[${i+1}列目] ${h}`;
        s.appendChild(opt);
      });
    });
    
    if(window.adminTempMaps) {
      document.getElementById('map-name').value = window.adminTempMaps.name;
      document.getElementById('map-id').value = window.adminTempMaps.id;
      document.getElementById('map-class').value = window.adminTempMaps.cls;
      document.getElementById('map-num').value = window.adminTempMaps.num;
    }
  }).getHeadersFromSheet(row);
}

function saveSettings() {
  const assignId = document.getElementById('admin-assign-id').value.trim();
  const quizId = document.getElementById('admin-quiz-id').value.trim();
  
  const mapName = document.getElementById('map-name').value;
  const mapId = document.getElementById('map-id').value;
  const mapClass = document.getElementById('map-class').value;
  const mapNum = document.getElementById('map-num').value;
  const rosterCols = document.getElementById('admin-roster-cols').value;
  const headerRows = document.getElementById('admin-header-row').value;
  
  document.querySelectorAll('button').forEach(b => b.disabled = true);
  
  google.script.run.withSuccessHandler(() => {
    alert("設定を保存し、A1セルへの反映を行いました。");
    document.querySelectorAll('button').forEach(b => b.disabled = false);
    showSetup();
    reloadClassList(); 
  }).withFailureHandler(err => {
    alert("エラー: " + err.message);
    document.querySelectorAll('button').forEach(b => b.disabled = false);
  }).saveAdminSettingsFromUI(assignId, quizId, mapName, mapId, mapClass, mapNum, rosterCols, headerRows);
}

// --- 入力モードの制御 ---
function startMode(mode) {
  const taskSel = document.getElementById('task-select');
  state.taskIndex = taskSel.value;
  
  if (!state.taskIndex || state.taskIndex === 'new') {
    alert("入力内容を選択してください。");
    return;
  }

  const selectedOpt = taskSel.options[taskSel.selectedIndex];
  state.taskName = selectedOpt.dataset.name || "";
  state.taskDate = selectedOpt.dataset.date || "";
  state.lastAction = null;
  
  state.mode = mode;
  document.getElementById('setup-view').style.display = 'none';
  
  const headerText = state.taskDate ? `${state.taskDate} 登録 : ${state.taskName}` : state.taskName;
  if (document.getElementById('seq-task-header')) document.getElementById('seq-task-header').innerText = headerText;
  if (document.getElementById('ref-task-header')) document.getElementById('ref-task-header').innerText = headerText;
  
  if (mode === 1) {
    state.currentIndex = findFirstUnansweredIndex();
    document.getElementById('sequential-view').style.display = 'flex';
    setupSeqView();
    updateSeqDisplay();
  } else {
    document.getElementById('reference-view').style.display = 'flex';
    setupRefView();
  }
  autoSave();
}

function autoSave() {
  google.script.run.saveUserState(state);
}

function saveAndExit() {
  autoSave();
  showSetup();
}

function showSetup() {
  document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
  document.getElementById('setup-view').style.display = 'flex';
}

// ==========================================
// Mode 1: 順次入力 (Sequential)
// ==========================================
function setupSeqView() {
  if (state.bookType === 'assignment') {
    document.getElementById('seq-assign-actions').style.display = 'grid';
    document.getElementById('seq-quiz-actions').style.display = 'none';
  } else {
    document.getElementById('seq-assign-actions').style.display = 'none';
    document.getElementById('seq-quiz-actions').style.display = 'block';
    tempNumStr = "";
    document.getElementById('seq-quiz-score').innerText = "_";
  }
}

function updateSeqDisplay() {
  const s = state.students[state.currentIndex];
  document.getElementById('seq-name-text').innerText = `${s.no}番：${s.name}`;
  document.getElementById('seq-current-info').innerText = `${state.currentIndex + 1} / ${state.students.length} 人目`;
  
  const currentVal = state.results[state.currentIndex];
  const badge = document.getElementById('seq-status-badge');
  if (currentVal !== "" && currentVal !== null) {
    badge.innerText = `[入力済: ${currentVal}]`;
    badge.style.color = '#188038';
  } else {
    badge.innerText = `[未入力]`;
    badge.style.color = '#ea4335';
  }

  if (state.lastAction) {
    document.getElementById('seq-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
  } else {
    document.getElementById('seq-last-action').innerText = ``;
  }
  
  if (state.currentIndex === state.students.length - 1) {
    document.getElementById('submit-btn-seq').style.display = 'block';
  } else {
    document.getElementById('submit-btn-seq').style.display = 'none';
  }

  // Quiz mode: show current score if already input
  if (state.bookType === 'quiz') {
    if (currentVal !== "" && currentVal !== null) {
      document.getElementById('seq-quiz-score').innerText = currentVal;
      document.getElementById('seq-quiz-score').style.color = '#188038'; // green
      tempNumStr = String(currentVal);
    } else {
      document.getElementById('seq-quiz-score').innerText = "_";
      document.getElementById('seq-quiz-score').style.color = '#1a73e8';
      tempNumStr = "";
    }
  }
}

function prevStudent() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    updateSeqDisplay();
  }
}

function nextStudent() {
  if (state.currentIndex < state.students.length - 1) {
    state.currentIndex++;
    updateSeqDisplay();
  }
}

// Mode 1 Assign actions
function recordSeqAssign(val) {
  state.lastAction = { name: state.students[state.currentIndex].name, val: val };
  state.results[state.currentIndex] = val;
  autoSave();
  if (state.currentIndex < state.students.length - 1) {
    state.currentIndex++;
    updateSeqDisplay();
  } else {
    updateSeqDisplay(); // Refresh to show submit button
  }
}

// Mode 1 Quiz actions
function kpSeq(val) {
  const display = document.getElementById('seq-quiz-score');
  display.style.color = '#333';
  if (typeof val === 'number') {
    tempNumStr += val;
    display.innerText = tempNumStr;
  } else if (val === 'Del') {
    tempNumStr = tempNumStr.slice(0, -1);
    display.innerText = tempNumStr || "_";
  } else if (val === 'Enter') {
    if (tempNumStr !== "") {
      state.lastAction = { name: state.students[state.currentIndex].name, val: tempNumStr };
      state.results[state.currentIndex] = tempNumStr;
      autoSave();
      if (state.currentIndex < state.students.length - 1) {
        state.currentIndex++;
        updateSeqDisplay();
      } else {
        updateSeqDisplay();
      }
    }
  }
}

// ==========================================
// Mode 2: 番号参照入力 (Reference)
// ==========================================
function setupRefView() {
  tempNumStr = "";
  document.getElementById('ref-input').value = "";
  
  document.getElementById('ref-status-badge').innerText = "";
  if (state.lastAction) {
    document.getElementById('ref-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
  } else {
    document.getElementById('ref-last-action').innerText = ``;
  }

  if (state.bookType === 'assignment') {
    document.getElementById('ref-assign-keypad').style.display = 'grid';
    document.getElementById('ref-quiz-keypad').style.display = 'none';
    document.getElementById('ref-name-display').innerText = "番号を入力";
    document.getElementById('ref-status-display').innerText = "";
  } else {
    document.getElementById('ref-assign-keypad').style.display = 'none';
    document.getElementById('ref-quiz-keypad').style.display = 'grid';
    refQuizState = "number";
    document.getElementById('ref-name-display').innerText = "番号を入力";
    document.getElementById('ref-status-display').innerText = "【出席番号 入力】";
  }
}

// --- Mode 2 Assign ---
function kpRef(val) {
  const display = document.getElementById('ref-name-display');
  const inputEl = document.getElementById('ref-input');
  const statusEl = document.getElementById('ref-status-display');
  
  if (typeof val === 'number') {
    tempNumStr += val;
    inputEl.value = tempNumStr;
    const student = state.students.find(s => s.no == tempNumStr);
    const badge = document.getElementById('ref-status-badge');
    if (student) {
      const idx = state.students.indexOf(student);
      const currentVal = state.results[idx];
      display.innerText = `${student.name}`;
      if (currentVal !== "" && currentVal !== null) {
        badge.innerText = `[入力済: ${currentVal}]`;
        badge.style.color = '#188038';
      } else {
        badge.innerText = `[未入力]`;
        badge.style.color = '#ea4335';
      }
    } else {
      display.innerText = "該当者なし";
      badge.innerText = "";
    }
  } else if (val === 'Del') {
    tempNumStr = tempNumStr.slice(0, -1);
    inputEl.value = tempNumStr;
    const badge = document.getElementById('ref-status-badge');
    if(!tempNumStr) {
      display.innerText = "番号を入力";
      badge.innerText = "";
    } else {
      const student = state.students.find(s => s.no == tempNumStr);
      if (student) {
        display.innerText = student.name;
        const currentVal = state.results[state.students.indexOf(student)];
        if (currentVal !== "" && currentVal !== null) {
          badge.innerText = `[入力済: ${currentVal}]`;
          badge.style.color = '#188038';
        } else {
          badge.innerText = `[未入力]`;
          badge.style.color = '#ea4335';
        }
      } else {
        display.innerText = "該当者なし";
        badge.innerText = "";
      }
    }
  } else if (val === 'Clear') {
    tempNumStr = "";
    inputEl.value = "";
    display.innerText = "番号を入力";
    document.getElementById('ref-status-badge').innerText = "";
  }
}

function recordRefAssign(val) {
  const display = document.getElementById('ref-name-display');
  const inputEl = document.getElementById('ref-input');
  const statusEl = document.getElementById('ref-status-display');
  
  const idx = state.students.findIndex(s => s.no == tempNumStr);
  if (idx !== -1) {
    state.lastAction = { name: state.students[idx].name, val: val };
    state.results[idx] = val;
    autoSave();
    display.innerText = `${state.students[idx].name} → [${val}] 保存`;
    display.style.color = '#188038';
    document.getElementById('ref-status-badge').innerText = "";
    document.getElementById('ref-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
    
    // Auto clear after short delay
    setTimeout(() => { 
      tempNumStr = ""; 
      inputEl.value = ""; 
      display.innerText = "番号を入力"; 
      display.style.color = '#333';
    }, 800);
  }
}

// --- Mode 2 Quiz ---
function kpRefQuiz(val) {
  const display = document.getElementById('ref-name-display');
  const inputEl = document.getElementById('ref-input');
  const statusEl = document.getElementById('ref-status-display');
  
  if (refQuizState === "number") {
    if (typeof val === 'number') {
      tempNumStr += val;
      inputEl.value = tempNumStr;
      
      const badge = document.getElementById('ref-status-badge');
      const student = state.students.find(s => s.no == tempNumStr);
      if (student) {
        display.innerText = student.name;
        const currentVal = state.results[state.students.indexOf(student)];
        if (currentVal !== "" && currentVal !== null) {
          badge.innerText = `[入力済: ${currentVal}]`;
          badge.style.color = '#188038';
          statusEl.innerText = "【Enterで得点入力へ】";
          statusEl.style.color = '#d93025';
        } else {
          badge.innerText = `[未入力]`;
          badge.style.color = '#ea4335';
          statusEl.innerText = "【出席番号 入力】 (Enterで次へ)";
          statusEl.style.color = '#1a73e8';
        }
      } else {
        display.innerText = "該当者なし";
        badge.innerText = "";
      }
    } else if (val === 'Del') {
      tempNumStr = tempNumStr.slice(0, -1);
      inputEl.value = tempNumStr;
      const badge = document.getElementById('ref-status-badge');
      if(!tempNumStr) {
        display.innerText = "番号を入力";
        badge.innerText = "";
      } else {
        const student = state.students.find(s => s.no == tempNumStr);
        if (student) {
          display.innerText = student.name;
          const currentVal = state.results[state.students.indexOf(student)];
          if (currentVal !== "" && currentVal !== null) {
            badge.innerText = `[入力済: ${currentVal}]`;
            badge.style.color = '#188038';
          } else {
            badge.innerText = `[未入力]`;
            badge.style.color = '#ea4335';
          }
        } else {
          display.innerText = "該当者なし";
          badge.innerText = "";
        }
      }
    } else if (val === 'Enter') {
      const idx = state.students.findIndex(s => s.no == tempNumStr);
      if (idx !== -1) {
        refTargetIdx = idx;
        refQuizState = "score";
        tempNumStr = "";
        inputEl.value = "";
        display.innerText = `${state.students[idx].name} の得点`;
        document.getElementById('ref-status-badge').innerText = "";
        statusEl.innerText = "【得点 入力】";
        statusEl.style.color = '#e37400';
      }
    }
  } 
  else if (refQuizState === "score") {
    if (typeof val === 'number') {
      tempNumStr += val;
      inputEl.value = tempNumStr;
    } else if (val === 'Del') {
      tempNumStr = tempNumStr.slice(0, -1);
      inputEl.value = tempNumStr;
    } else if (val === 'Enter') {
      if (tempNumStr !== "") {
        state.lastAction = { name: state.students[refTargetIdx].name, val: tempNumStr + "点" };
        state.results[refTargetIdx] = tempNumStr;
        autoSave();
        display.innerText = `保存済: ${tempNumStr}点`;
        display.style.color = '#188038';
        document.getElementById('ref-status-badge').innerText = "";
        statusEl.innerText = "";
        document.getElementById('ref-last-action').innerText = `💡 直前の入力: ${state.lastAction.name} → ${state.lastAction.val}`;
        
        setTimeout(() => {
          refQuizState = "number";
          tempNumStr = "";
          inputEl.value = "";
          display.innerText = "番号を入力";
          display.style.color = '#333';
          statusEl.innerText = "【出席番号 入力】";
          statusEl.style.color = '#1a73e8';
        }, 800);
      }
    }
  }
}

// ==========================================
// スプレッドシートへの一括書き込み
// ==========================================
function confirmData() {
  if (!confirm("入力データをスプレッドシートに反映しますか？\n（確定後、一時保存データは消去されます）")) return;
  
  // 送信中のUIロック処理
  document.querySelectorAll('button').forEach(b => b.disabled = true);
  
  google.script.run.withSuccessHandler(url => {
    alert("保存が完了しました。");
    document.querySelectorAll('button').forEach(b => b.disabled = false);
    if (confirm("スプレッドシートを開いて確認しますか？")) {
      window.open(url, '_blank');
    }
    // Clear state
    state.results = new Array(state.students.length).fill("");
    state.currentIndex = 0;
    showSetup();
  }).withFailureHandler(err => {
    alert("エラーが発生しました: " + err.message);
    document.querySelectorAll('button').forEach(b => b.disabled = false);
  }).submitAttendanceData(state.bookType, state.currentClass, state.taskIndex, state.taskName, state.results);
}
</script>
